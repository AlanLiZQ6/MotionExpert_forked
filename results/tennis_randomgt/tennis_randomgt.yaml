# RandomGT experiment — match CoachMe original training strategy.
# Key change: RandomGT randomly picks 1 label per sample per epoch,
# instead of PerGT which forces model to learn all 6 labels for same input.
#
# python -m torch.distributed.run --nproc_per_node=1 --master_port=29050 main_tennis.py --cfg_file ./results/tennis_randomgt/tennis_randomgt.yaml

TASK :
    PRETRAIN : False
    SPORT : "Tennis"
    HPP_WAY : "HPP"
    REF : True
    DIFF_WAY : "Subtraction"
    DIFF_TYPE : "Skeleton"
    PROJ_STRATEGY : "ATTENTION_POOL"

STANDARD_PATH : "/workspace/dataset/pkl_output_smpl22/tennis_standard.pkl"
WEIGHT_PATH : "./results/pretrain_ref/pretrain_checkpoints/checkpoint_epoch_00012.pth"

DATA :
    TRAIN : "/workspace/dataset/pkl_output_smpl22/tennis_train.pkl"
    TEST : "/workspace/dataset/pkl_output_smpl22/tennis_test.pkl"
    BATCH_SIZE : 4

OPTIMIZER :
    LR : 1e-4
    MAX_EPOCH : 200
    WARMUP_STEPS : 5000

EVAL_CYCLE : 1
LOGDIR : "./results/tennis_randomgt"
LOSS : "RandomGT"
DEBUG : False
SETTING: "ALIGNED"
EVAL :
    score : True
    ckpt : "None"
