# tennis_v4: LR=1e-4, no warmup, cosine schedule over 30 epochs, ATTENTION_POOL with unfrozen projection
# Cosine decay from peak LR down to ~0 over the full 30 epochs (no warmup — starts at peak immediately).
# python -m torch.distributed.run --nproc_per_node=1 --master_port=29050 main_tennis.py --cfg_file ./results/tennis_v4/tennis_v4.yaml

TASK :
    PRETRAIN : False
    SPORT : "Tennis"
    HPP_WAY : "HPP"
    REF : True
    DIFF_WAY : "Subtraction"
    DIFF_TYPE : "Skeleton"
    PROJ_STRATEGY : "ATTENTION_POOL"
    UNFREEZE_PROJECTION : True

STANDARD_PATH : "/workspace/dataset/pkl_output_smpl22/tennis_standard.pkl"
WEIGHT_PATH : "./results/pretrain_ref/pretrain_checkpoints/checkpoint_epoch_00012.pth"

DATA :
    TRAIN : "/workspace/dataset/pkl_output_smpl22/tennis_train.pkl"
    TEST : "/workspace/dataset/pkl_output_smpl22/tennis_test.pkl"
    BATCH_SIZE : 4

OPTIMIZER :
    LR : 1e-4
    MAX_EPOCH : 30
    WARMUP_STEPS : 0
    SCHEDULER : cosine

EVAL_CYCLE : 5
LOGDIR : "./results/tennis_v4"
LOSS : "RandomGT"
DEBUG : False
SETTING : "ALIGNED"
EVAL :
    score : True
    ckpt : "./results/tennis_v4/checkpoints/checkpoint_epoch_00010.pth"
