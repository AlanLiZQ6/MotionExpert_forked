# Augmented labels + low LR (3e-5) + warmup 5000
# Previous best (warmup5000 + LR 1e-4) peaked at epoch 10 when LR was ~3.7e-5.
# This experiment uses 3e-5 as peak LR to maintain that sweet spot longer.
#
# python -m torch.distributed.run --nproc_per_node=1 --master_port=29050 main_tennis.py --cfg_file ./results/tennis_aug_lowlr/tennis_aug_lowlr.yaml

TASK :
    PRETRAIN : False
    SPORT : "Tennis"
    HPP_WAY : "HPP"
    REF : True
    DIFF_WAY : "Subtraction"
    DIFF_TYPE : "Skeleton"
    PROJ_STRATEGY : "ATTENTION_POOL"

STANDARD_PATH : "/workspace/dataset/pkl_output_smpl22/tennis_standard.pkl"
WEIGHT_PATH : "./results/pretrain_ref/pretrain_checkpoints/checkpoint_epoch_00012.pth"

DATA :
    TRAIN : "/workspace/dataset/pkl_output_smpl22/tennis_train.pkl"
    TEST : "/workspace/dataset/pkl_output_smpl22/tennis_test.pkl"
    BATCH_SIZE : 4

OPTIMIZER :
    LR : 3e-5
    MAX_EPOCH : 200
    WARMUP_STEPS : 5000

EVAL_CYCLE : 5
LOGDIR : "./results/tennis_aug_lowlr"
LOSS : "RandomGT"
DEBUG : False
SETTING: "ALIGNED"
EVAL :
    score : True
    ckpt : "None"
