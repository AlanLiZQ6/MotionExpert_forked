# Unfrozen Projection + RandomGT, continue from epoch 10 (best diversity).
# Key change: Projection base weights are unfrozen for full fine-tuning,
# giving the model more capacity to distinguish different inputs.
#
# python -m torch.distributed.run --nproc_per_node=1 --master_port=29050 main_tennis.py --cfg_file ./results/tennis_unfrozen/tennis_unfrozen.yaml

TASK :
    PRETRAIN : False
    SPORT : "Tennis"
    HPP_WAY : "HPP"
    REF : True
    DIFF_WAY : "Subtraction"
    DIFF_TYPE : "Skeleton"
    PROJ_STRATEGY : "ATTENTION_POOL"
    UNFREEZE_PROJECTION : True

STANDARD_PATH : "/workspace/dataset/pkl_output_smpl22/tennis_standard.pkl"
WEIGHT_PATH : "./results/pretrain_ref/pretrain_checkpoints/checkpoint_epoch_00012.pth"

DATA :
    TRAIN : "/workspace/dataset/pkl_output_smpl22/tennis_train.pkl"
    TEST : "/workspace/dataset/pkl_output_smpl22/tennis_test.pkl"
    BATCH_SIZE : 4

OPTIMIZER :
    LR : 1e-5
    MAX_EPOCH : 200
    WARMUP_STEPS : 500

EVAL_CYCLE : 1
LOGDIR : "./results/tennis_unfrozen"
LOSS : "RandomGT"
DEBUG : False
SETTING: "ALIGNED"
EVAL :
    score : True
    ckpt : "None"
