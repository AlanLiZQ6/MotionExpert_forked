# tennis_v2: paper-matched hyperparameters
# LR=1e-4 (paper default), warmup 5000 steps, train longer
# python -m torch.distributed.run --nproc_per_node=1 --master_port=29050 main_tennis.py --cfg_file ./results/tennis_v2/tennis_v2.yaml

TASK :
    PRETRAIN : False
    SPORT : "Tennis"
    HPP_WAY : "HPP"
    REF : True
    DIFF_WAY : "Subtraction"
    DIFF_TYPE : "Skeleton"
    PROJ_STRATEGY : "ATTENTION_POOL"
    UNFREEZE_PROJECTION : True

STANDARD_PATH : "/workspace/dataset/pkl_output_smpl22/tennis_standard.pkl"
WEIGHT_PATH : "./results/pretrain_ref/pretrain_checkpoints/checkpoint_epoch_00012.pth"

DATA :
    TRAIN : "/workspace/dataset/pkl_output_smpl22/tennis_train.pkl"
    TEST : "/workspace/dataset/pkl_output_smpl22/tennis_test.pkl"
    BATCH_SIZE : 4

OPTIMIZER :
    LR : 1e-4
    MAX_EPOCH : 200
    WARMUP_STEPS : 5000

EVAL_CYCLE : 5
LOGDIR : "./results/tennis_v2"
LOSS : "RandomGT"
DEBUG : False
SETTING: "ALIGNED"
EVAL :
    score : True
    ckpt : "/workspace/MotionExpert_forked/results/tennis_v2/checkpoints/checkpoint_epoch_00025.pth"
